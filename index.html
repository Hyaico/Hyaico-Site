<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYAICO - Innovative AI Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="font-['Inter'] bg-white text-gray-900 overflow-hidden">
    <!-- Particle Canvas -->
    <canvas id="particles"></canvas>

    <!-- Header Background -->
    <div class="fixed w-full h-24 z-40 pointer-events-none" style="background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 100%); backdrop-filter: blur(4px); -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%); mask-image: linear-gradient(to bottom, black 50%, transparent 100%);"></div>

    <!-- Header Content -->
    <header class="fixed w-full z-50 transition-all duration-300 pointer-events-none" id="header">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center pointer-events-auto">
                <img src="assets/HyaicoBlack.svg" alt="HYAICO Logo" class="h-8 opacity-90 hover:opacity-100 transition-opacity">
            </a>
            
            <!-- Apps Button integrated back into header layout for perfect spacing -->
            <button onclick="openAppsModal()" class="pointer-events-auto bg-gray-900 text-white px-6 py-2.5 rounded-full font-medium hover:bg-gray-800 transition-all duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5 group flex items-center space-x-2">
                <span>Our Apps</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="min-h-screen flex items-center justify-center pt-16 relative overflow-hidden bg-transparent">
        <div class="container mx-auto px-4 text-center relative z-10" id="hero">
            <h1 class="text-5xl md:text-7xl font-bold text-gray-900 mb-6 relative tracking-tight">
                <span class="word-reveal">Innovative</span>
                <span class="word-reveal">AI</span>
                <span class="word-reveal">Solutions</span><br/>
                <span class="word-reveal">for</span>
                <span class="word-reveal">Everyday</span>
                <span class="word-reveal">Life</span>
            </h1>
            <p class="text-xl md:text-2xl text-gray-600 mb-10 max-w-3xl mx-auto reveal-text font-light">
                At HYAICO, we create AI-driven apps that simplify life and empower users.
            </p>
            <button onclick="openAppsModal()" class="inline-block bg-gray-900 text-white px-8 py-4 rounded-full font-medium reveal-button hover:bg-gray-800 transition-colors">
                Explore Our Apps
            </button>
        </div>
    </section>

    <!-- Apps Modal (Overhauled) -->
    <div id="appsModal" class="fixed inset-0 z-[100] flex items-center justify-center pointer-events-none">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-gray-950/80 backdrop-blur-sm opacity-0 transition-opacity duration-500 modal-backdrop" onclick="closeAppsModal()"></div>
        
        <!-- Modal Content Container -->
        <div class="relative w-full max-w-2xl mx-4 opacity-0 scale-95 transition-all duration-500 modal-content" style="transform-origin: center center;">
            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col">
                <!-- Header area of modal -->
                <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                    <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Ecosystem</h2>
                    <button onclick="closeAppsModal()" class="text-gray-400 hover:text-gray-900 bg-white hover:bg-gray-100 rounded-full p-2 transition-colors shadow-sm border border-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                
                <!-- Content area -->
                <div class="p-8">
                    <a href="https://justcooked.app" target="_blank" class="group block relative">
                        <!-- High quality subtle gradient hover glow (neutral/monochrome instead of blue) -->
                        <div class="absolute -inset-0.5 bg-gradient-to-r from-gray-200 to-gray-300 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500 blur-sm"></div>
                        <div class="bg-white border border-gray-100 group-hover:border-gray-200 p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-500 relative z-10 flex items-center justify-between">
                            <div class="flex items-center space-x-6">
                                <div class="w-16 h-16 rounded-2xl shadow-sm border border-gray-50 flex items-center justify-center overflow-hidden transform group-hover:scale-105 transition-all duration-500 group-hover:shadow-md bg-white">
                                    <img src="assets/Icon.svg" alt="Just Cooked Icon" class="w-full h-full object-cover transition-transform duration-500 group-hover:rotate-3">
                                </div>
                                <div>
                                    <h3 class="text-2xl font-bold text-gray-900 mb-1 group-hover:text-black transition-colors duration-300">Just Cooked</h3>
                                    <p class="text-gray-500 font-light">AI-powered cooking made easy</p>
                                </div>
                            </div>
                            <div class="w-12 h-12 rounded-full bg-gray-50 border border-gray-100 flex items-center justify-center group-hover:bg-gray-900 group-hover:border-gray-900 group-hover:text-white transition-all duration-500 text-gray-400 group-hover:shadow-md">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform group-hover:translate-x-1 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer (Fixed at bottom) -->
    <footer class="fixed bottom-0 w-full py-6 bg-transparent z-40 pointer-events-none">
        <div class="container mx-auto px-4">
            <div class="flex justify-center items-center">
                <p class="text-center text-gray-400 text-sm font-light tracking-wide">
                    &copy; <script>document.write(new Date().getFullYear())</script> HYAICO. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
